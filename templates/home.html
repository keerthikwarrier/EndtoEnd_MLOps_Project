<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Performance Predictor</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 20px;
            padding: 30px;
            width: 500px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-custom {
            background: #667eea;
            color: white;
            font-weight: bold;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background: #5a67d8;
        }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            background: #e6fffa;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🎓 Student Exam Predictor</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <!-- Gender -->
        <div class="mb-3">
            <label>Gender</label>
            <select class="form-select" name="gender" required>
                <option selected disabled>Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <!-- Ethnicity -->
        <div class="mb-3">
            <label>Race / Ethnicity</label>
            <select class="form-select" name="ethnicity" required>
                <option selected disabled>Select</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <!-- Education -->
        <div class="mb-3">
            <label>Parental Education</label>
            <select class="form-select" name="parental_level_of_education" required>
                <option selected disabled>Select</option>
                <option value="associate's degree">Associate's</option>
                <option value="bachelor's degree">Bachelor's</option>
                <option value="high school">High School</option>
                <option value="master's degree">Master's</option>
                <option value="some college">Some College</option>
                <option value="some high school">Some High School</option>
            </select>
        </div>

        <!-- Lunch -->
        <div class="mb-3">
            <label>Lunch Type</label>
            <select class="form-select" name="lunch" required>
                <option selected disabled>Select</option>
                <option value="standard">Standard</option>
                <option value="free/reduced">Free/Reduced</option>
            </select>
        </div>

        <!-- Course -->
        <div class="mb-3">
            <label>Test Preparation</label>
            <select class="form-select" name="test_preparation_course" required>
                <option selected disabled>Select</option>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <!-- Scores -->
        <div class="mb-3">
            <label>Reading Score</label>
            <input type="number" class="form-control" name="reading_score" min="0" max="100" required>
        </div>

        <div class="mb-3">
            <label>Writing Score</label>
            <input type="number" class="form-control" name="writing_score" min="0" max="100" required>
        </div>

        <!-- Button -->
        <div class="d-grid">
            <button type="submit" class="btn btn-custom">Predict Maths Score</button>
        </div>
    </form>

    <!-- Result -->
    {% if results %}
    <div class="result-box">
        📊 Predicted Maths Score: {{ results }}
    </div>
    {% endif %}
</div>

</body>
</html>
